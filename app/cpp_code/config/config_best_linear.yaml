mpc:
  horizon: 3
  simulation_mode: 2  # 1 one-time simulation, 2 closed loop simulation
  loop_size : 5000 # number of MPC loops to be executed in closed loop simulation, use infinity for entire driving cycle
  number_of_iterations:  50

unconstrained_solver:
  type: "GN"        # GN/LV/DL

linear_solver:
  type: 6
 
inequality_algorithm: "ispd"   # "al" or "bipm" or "ispd"
equality_algorithm: "gn"       # "gn" or "al" 

general_settings:
  verbose: 0
  max_num_inner_iterations:  8
  lagrange_multiplier_initial_eq: 0.0
  rho_initial_eq: 0.5
  rho_min_eq: 0.55
  rho_max_eq: 5e5
  rho_update_factor_eq: 20

#al_ineq_settings: use same for the equality


bipm_settings:
  kappa0: 0.2
  t_final: 1500.0
  nu: 8.0

ispd_settings:
  lagrange_multiplier_initial_ineq: 10.0
  slack_variable_initial_ineq: 2.0
  kappa0: .2
  nu: 10.0
  t_final: 1500.0
  t_termination: 1500.0
  step_size_limit: 5e-1
  aux_scaling_factor: 0.2 
  aux_correction_value: 1e-6
  ineq_prediction_param: 1.0
  feas_tol: 1e-3
  update_kappa_strategy: 0  # 0:check if t>=t_memory, 1: check if t>=_kappa0;  2: accept what comes from the duality gap; 3: by fixed nu
  _init_kappa_strategy: 0   # constant  = _kappa0, 1: based on duality gap
  keep_aux_positive_strategy: 0 # 0: scaling of the potential variables, 1: correction to positive value using aux_correction_value
  init_slack_strategy: 0 # 0:max(abs(g(x0)),_aux_correction_value), 1: max(abs(g(x0)),_slack_variable_initial_ineq, 2: constant  = _slack_variable_initial_ineq, )
  ineq_prediction_strategy: 0    #  0: \eta J*delta x + g(x), 1: g(x+ \eta delta x)
  linear_system_strategy: 0
  constraints_backtracking_flag: 1 # 0 no backtracking, 1 backtracking
 
  limit_kappa_final: 1 #  limit t to t_finalfrom



acc_settings:
  linearInequalities: 1 # 0: off, 1: on
  scaleInequalities : 0 # 0: off, 1: on